services:
  - type: web
    name: slashask
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/streamlit_app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        value: https://trackerwaveaichat.openai.azure.com/
      - key: REDIS_HOST
        fromService:
          type: redis
          name: slashask-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: slashask-redis
          property: port
      - key: PYTHONPATH
        value: /opt/render/project/src

  - type: redis
    name: slashask-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
